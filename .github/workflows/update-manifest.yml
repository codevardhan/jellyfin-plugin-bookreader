name: Update Plugin Manifest

on:
  release:
    types: [published]

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update manifest.json
        env:
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/jellyfin-book-reader.zip"

          # Download the zip to compute checksum
          curl -sL "$DOWNLOAD_URL" -o /tmp/plugin.zip
          CHECKSUM=$(md5sum /tmp/plugin.zip | cut -d ' ' -f 1)

          cat > manifest.json << EOF
          [
            {
              "guid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
              "name": "Book Reader",
              "description": "REST API for book reading apps — browse library, download books, sync reading progress across devices.",
              "overview": "Book reading API for Jellyfin",
              "owner": "codevardhan",
              "category": "General",
              "imageUrl": "",
              "versions": [
                {
                  "version": "${VERSION}",
                  "changelog": "See https://github.com/${REPO}/releases/tag/${TAG}",
                  "targetAbi": "10.11.0.0",
                  "sourceUrl": "${DOWNLOAD_URL}",
                  "checksum": "${CHECKSUM}",
                  "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                }
              ]
            }
          ]
          EOF

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest for ${{ github.event.release.tag_name }}" || exit 0
          git push