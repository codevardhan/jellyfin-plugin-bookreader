name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore JellyfinBookReader.sln

      - name: Build
        run: dotnet build JellyfinBookReader.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test JellyfinBookReader.Tests/ --configuration Release --no-build --verbosity normal

  build:
    name: Build & Package
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: dotnet publish JellyfinBookReader.csproj --configuration Release --output ./publish

      - name: Package plugin
        run: |
          mkdir -p dist
          cp publish/JellyfinBookReader.dll dist/
          cp publish/Microsoft.Data.Sqlite.dll dist/
          cp publish/SQLitePCLRaw.batteries_v2.dll dist/
          cp publish/SQLitePCLRaw.core.dll dist/
          cp publish/SQLitePCLRaw.provider.e_sqlite3.dll dist/
          cd dist && zip -r ../jellyfin-book-reader.zip . && cd ..

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum jellyfin-book-reader.zip | awk '{print $1}')
          echo "md5=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Checksum: $CHECKSUM"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: jellyfin-book-reader.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHECKSUM="${{ steps.checksum.outputs.md5 }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"

          # Update the manifest with the new version info
          python3 -c "
          import json, sys
          with open('manifest.json', 'r') as f:
              manifest = json.load(f)
          
          new_version = {
              'version': '${VERSION}',
              'changelog': 'See release notes on GitHub.',
              'targetAbi': '10.11.0.0',
              'sourceUrl': 'https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/jellyfin-book-reader.zip',
              'checksum': '${CHECKSUM}',
              'timestamp': '${TIMESTAMP}'
          }
          
          # Prepend new version (latest first)
          manifest[0]['versions'].insert(0, new_version)
          
          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=4)
          "

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest for ${{ github.ref_name }}" || exit 0
          git push origin HEAD:main