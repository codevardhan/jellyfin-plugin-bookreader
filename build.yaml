  - "SQLitePCLRaw.provider.e_sqlite3.dll"
changelog: |-
  ## 1.0.0.0
  - Initial release
  - Library browsing with search, filter, sort, and pagination
  - Book file downloads with range request support
  - Cover image extraction (Jellyfin cache + EPUB fallback)
  - Three-tier reading progress model (universal, page, chapter)
  - Offline sync with conflict detection
  - Batch progress sync (up to 100 books per request)
  - Reading session tracking with heartbeat and auto-close
  - Reading statistics with streaks and per-book breakdowns
  - Scheduled task for stale session cleanup