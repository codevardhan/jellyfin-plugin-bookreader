changelog: |-
  ## 1.2.0.1
  - Fix bug with SharpCompress
  ## 1.2.0.0
  - Client data sync: per-book opaque JSON blob endpoint for saved quotes, bookmarks, and stats
  - Batch client data sync for offline catch-up (`PUT /api/BookReader/client-data/batch`)
  - Conflict detection for client data (same `updatedAt` mechanism as progress sync)
  - Database schema v3 (automatic migration, no action required)

  ## 1.1.0.0
  - CBZ/CBR page streaming (no full download required)
  - BookPageCache permission fallback to in-memory on /tmp access errors
  - Fix: comic page navigation no longer flashes white between pages