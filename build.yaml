owner: "codevardhan"
overview: "REST API for book reading apps — browse, download, and sync progress"
description: >
  Exposes a REST API for book reading apps to browse your Jellyfin book library,
  download book files, extract cover images, and sync reading progress across
  devices. Supports EPUB, PDF, MOBI, AZW3, CBZ, CBR, FB2, TXT, and DJVU.
  Features offline sync with conflict detection, reading session tracking,
  and reading streak statistics.
category: "General"
